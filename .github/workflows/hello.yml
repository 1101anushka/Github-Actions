# Workflow
# Should have a name (No Indentation required for naming a workflow)
name: Hello

# On tells when the workflow should run, (Indentation required)
on: 
  workflow_dispatch:     
# Jobs
# Should be inside the workflow. Job tells what the workflow should do
# There can one or more jobs, hence we write jobs
# jobs is a object, so needs indentation
jobs:
  say-hello:
  # Creates a ephemeral(last for a short time) container with ubuntu running
    runs-on: ubuntu-latest
  # that container will have steps to execute, name those steps and use run:
  # Steps
    steps:
      - name: Say hello to Everyone
        run: echo "Hello Biilionaire"

# Should be inside the jobs

# Actions
# Should be inside the steps
